name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Hostinger via FTP
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open -u '${{ secrets.FTP_USERNAME }}' '${{ secrets.FTP_SERVER }}' --password='${{ secrets.FTP_PASSWORD }}';
            mirror -R --delete --verbose --exclude='.git/' ./out/ /public_html/;
            bye
          "
